<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Usuario - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand">🏪 Inventario</span>
        <div class="d-flex align-items-center gap-3">
            <a href="{{ url_for('main.usuarios') }}" class="btn btn-outline-light btn-sm">
                👥 Usuarios
            </a>
            <span class="text-white">
                👤 {{ usuario.nombre }}
                <span class="badge bg-warning">{{ usuario.rol }}</span>
            </span>
            <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm">
                Cerrar sesión
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="card shadow-sm">
                    <div class="card-body p-4">

                        <h5 class="mb-4">➕ Crear Nuevo Usuario</h5>

                        <!-- Mensajes flash -->
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }}">{{ message }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" name="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Rol</label>
                                <select name="rol" class="form-select">
                                    <option value="trabajador">Trabajador</option>
                                    <option value="jefe">Jefe</option>
                                </select>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success w-100">
                                    Crear Usuario
                                </button>
                                <a href="{{ url_for('main.usuarios') }}" class="btn btn-secondary w-100">
                                    Cancelar
                                </a>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
