{% extends 'base.html' %}
{% block title %}Editar Producto{% endblock %}

{% block content %}

    <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-6">

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <h5 class="mb-4">✏️ Editar Producto</h5>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" name="nombre" class="form-control"
                                   value="{{ producto.nombre }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <input type="text" name="descripcion" class="form-control"
                                   value="{{ producto.descripcion }}">
                        </div>
                        <div class="row">
                            <div class="col mb-3">
                                <label class="form-label">Cantidad</label>
                                <input type="number" name="cantidad" class="form-control"
                                       value="{{ producto.cantidad }}" min="0" required>
                            </div>
                            <div class="col mb-3">
                                <label class="form-label">Precio (S/)</label>
                                <input type="number" name="precio" class="form-control"
                                       value="{{ producto.precio }}" min="0" step="0.01" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <input type="text" name="categoria" class="form-control"
                                   value="{{ producto.categoria }}">
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning w-100">Actualizar</button>
                            <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary w-100">Cancelar</a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>

{% endblock %}
