{% extends 'base.html' %}
{% block title %}Editar Usuario - Inventario{% endblock %}

{% block content %}

    <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-5">

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <h5 class="mb-4">✏️ Editar Usuario</h5>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" name="nombre" class="form-control"
                                value="{{ usuario_edit.nombre }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control"
                                value="{{ usuario_edit.email }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nueva Contraseña</label>
                            <input type="password" name="password" class="form-control"
                                placeholder="Dejar vacío para no cambiar">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rol</label>
                            <select name="rol" class="form-select">
                                <option value="trabajador" {{ 'selected' if usuario_edit.rol == 'trabajador' }}> 
                                    Trabajador
                                </option>
                                <option value="jefe" {{ 'selected' if usuario_edit.rol == 'jefe' }}>
                                    Jefe
                                </option>
                            </select>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning w-100">Actualizar</button>
                            <a href="{{ url_for('main.usuarios') }}" class="btn btn-secondary w-100">Cancelar</a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>

{% endblock %}
