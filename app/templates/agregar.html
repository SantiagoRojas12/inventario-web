<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand">🏪 Inventario</span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white">
                👤 {{ usuario.nombre }}
                <span class="badge bg-warning">{{ usuario.rol }}</span>
            </span>
            <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm">
                Cerrar sesión
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow-sm">
                    <div class="card-body p-4">

                        <h5 class="mb-4">➕ Agregar Producto</h5>

                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" name="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Descripción</label>
                                <input type="text" name="descripcion" class="form-control">
                            </div>
                            <div class="row">
                                <div class="col mb-3">
                                    <label class="form-label">Cantidad</label>
                                    <input type="number" name="cantidad" class="form-control" min="0" required>
                                </div>
                                <div class="col mb-3">
                                    <label class="form-label">Precio (S/)</label>
                                    <input type="number" name="precio" class="form-control" min="0" step="0.01" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Categoría</label>
                                <input type="text" name="categoria" class="form-control">
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success w-100">
                                    Guardar Producto
                                </button>
                                <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary w-100">
                                    Cancelar
                                </a>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
